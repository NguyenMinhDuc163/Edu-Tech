name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump_version:
    name: Bump pubspec build number
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      build_number: ${{ steps.bump.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment build number
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          path = Path("pubspec.yaml")
          text = path.read_text()
          pattern = re.compile(r"^version:\s*([0-9]+(?:\.[0-9]+){2})\+([0-9]+)\s*$", re.MULTILINE)
          match = pattern.search(text)
          if not match:
            raise SystemExit("pubspec.yaml must contain version: x.y.z+n")

          version_name = match.group(1)
          build_number = int(match.group(2)) + 1
          new_line = f"version: {version_name}+{build_number}"
          text = pattern.sub(new_line, text, count=1)
          path.write_text(text)

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
            output.write(f"version={version_name}\n")
            output.write(f"build_number={build_number}\n")
          PY

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pubspec.yaml; then
            echo "No pubspec.yaml version change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "ci: bump iOS build to ${{ steps.bump.outputs.version }}+${{ steps.bump.outputs.build_number }} [skip ci]"
          git push

  build_testflight:
    name: Build and upload TestFlight
    needs: bump_version
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
    steps:
      - name: Checkout bumped main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          api_key_path="$RUNNER_TEMP/AuthKey.p8"
          echo "APP_STORE_CONNECT_API_KEY_KEY_FILEPATH=$api_key_path" >> "$GITHUB_ENV"
          printf '%s' '${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}' > "$api_key_path"
          chmod 600 "$api_key_path"

      - name: Install Apple signing assets
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/ios_distribution.p12"
          profile_path="$RUNNER_TEMP/appstore.mobileprovision"
          profile_plist="$RUNNER_TEMP/appstore_profile.plist"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          CERTIFICATE_PATH="$certificate_path" PROFILE_PATH="$profile_path" python3 <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64"])
          )
          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_APPSTORE_PROVISIONING_PROFILE_BASE64"])
          )
          PY

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$profile_plist")
          profile_name=$(/usr/libexec/PlistBuddy -c "Print Name" "$profile_plist")
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Read Flutter version
        id: flutter_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(jq -r '.flutter' .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: ios

      - name: Clean workspace build outputs
        shell: bash
        run: |
          set -euo pipefail
          flutter clean
          rm -rf build ios/build ios/Pods ios/.symlinks

      - name: Upload to TestFlight
        working-directory: ios
        shell: bash
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore

      - name: Upload fastlane gym logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-gym-logs
          path: ~/Library/Logs/gym/*.log
          if-no-files-found: ignore
