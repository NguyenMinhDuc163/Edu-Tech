name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump_version:
    name: Bump pubspec build number
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      build_number: ${{ steps.bump.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment build number
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          path = Path("pubspec.yaml")
          text = path.read_text()
          pattern = re.compile(r"^version:\s*([0-9]+(?:\.[0-9]+){2})\+([0-9]+)\s*$", re.MULTILINE)
          match = pattern.search(text)
          if not match:
            raise SystemExit("pubspec.yaml must contain version: x.y.z+n")

          version_name = match.group(1)
          build_number = int(match.group(2)) + 1
          new_line = f"version: {version_name}+{build_number}"
          text = pattern.sub(new_line, text, count=1)
          path.write_text(text)

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
            output.write(f"version={version_name}\n")
            output.write(f"build_number={build_number}\n")
          PY

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pubspec.yaml; then
            echo "No pubspec.yaml version change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "ci: bump iOS build to ${{ steps.bump.outputs.version }}+${{ steps.bump.outputs.build_number }} [skip ci]"
          git push

  build_testflight:
    name: Build and upload TestFlight
    needs: bump_version
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: ${{ runner.temp }}/AuthKey.p8
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
    steps:
      - name: Checkout bumped main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}' > "$APP_STORE_CONNECT_API_KEY_KEY_FILEPATH"
          chmod 600 "$APP_STORE_CONNECT_API_KEY_KEY_FILEPATH"

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Read Flutter version
        id: flutter_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(jq -r '.flutter' .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: ios

      - name: Clean workspace build outputs
        shell: bash
        run: |
          set -euo pipefail
          flutter clean
          rm -rf build ios/build ios/Pods ios/.symlinks

      - name: Upload to TestFlight
        working-directory: ios
        shell: bash
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
